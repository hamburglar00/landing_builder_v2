name: Encoding Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check-encoding:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run encoding check (changed files)
        run: npm run check:encoding:changed
